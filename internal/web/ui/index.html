<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeliner</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --border:  #30363d;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --accent:  #58a6ff;
  --green:   #3fb950;
  --amber:   #d29922;
  --red:     #f85149;
  --purple:  #bc8cff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

h1 { font-size: 18px; font-weight: 600; }
h1 span { color: var(--accent); }
.version-badge { color: var(--muted); font-size: 11px; font-weight: 400; margin-left: 6px; }

.header-meta { color: var(--muted); font-size: 12px; }

h2 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 14px;
}

section { margin-bottom: 32px; }

/* task grid */
.task-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}

.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.task-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.task-name { font-weight: 600; font-size: 15px; word-break: break-all; }
.task-schedule {
  font-size: 11px;
  color: var(--muted);
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
  cursor: default;
}

.task-timing { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 3px; }
.task-timing span { display: flex; justify-content: space-between; gap: 8px; }
.task-timing b { color: var(--text); font-weight: 400; }

.task-stats { display: flex; gap: 20px; justify-content: center; }
.stat { display: flex; flex-direction: column; align-items: center; }
.stat-val { font-size: 22px; font-weight: 700; line-height: 1.1; }
.stat-val.a { color: var(--green); }
.stat-val.r { color: var(--amber); }
.stat-val.f { color: var(--red); }
.stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

.task-empty { font-size: 12px; color: var(--muted); }
.task-err { font-size: 11px; color: var(--red); }

.btn-run {
  margin-top: auto;
  padding: 7px 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  width: 100%;
}
.btn-run:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(88,166,255,0.06);
}
.btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-run.triggered { border-color: var(--amber); color: var(--amber); }
.btn-run.running   { border-color: var(--accent); color: var(--accent); }

.running-badge {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--accent);
  background: rgba(88,166,255,0.12);
  border: 1px solid rgba(88,166,255,0.3);
  border-radius: 4px;
  padding: 1px 6px;
  white-space: nowrap;
  flex-shrink: 0;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

/* log console */
.log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.log-header h2 { margin: 0; }
.log-controls { display: flex; align-items: center; gap: 10px; }

.log-filter {
  padding: 3px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  width: 200px;
  outline: none;
}
.log-filter:focus { border-color: var(--accent); }
.log-filter::placeholder { color: var(--muted); }

.log-status { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
.dot.on { background: var(--green); }

.btn-clear {
  padding: 3px 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
}
.btn-clear:hover { border-color: var(--text); color: var(--text); }

.btn-reload {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: border-color 0.15s, color 0.15s;
}
.btn-reload:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.btn-reload:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-reload.ok        { border-color: var(--green); color: var(--green); }
.btn-reload.err       { border-color: var(--red);   color: var(--red); }
.btn-reload.triggered { border-color: var(--amber); color: var(--amber); }

.log-console {
  background: #010409;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  height: 300px;
  overflow-y: auto;
  overflow-x: auto;
  font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  font-size: 12px;
  line-height: 1.65;
}

.log-line { white-space: pre; }

.no-tasks { color: var(--muted); padding: 40px 0; text-align: center; font-size: 13px; }

/* tabs */
.tab-bar { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab-btn {
  padding: 8px 16px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: -1px;
  transition: color 0.15s;
}
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* config editor — textarea+pre overlay for syntax highlighting */
.editor-wrap {
  position: relative;
  width: 100%;
  min-height: 400px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.editor-wrap:focus-within { border-color: var(--accent); }
.editor-hl, .editor-ta {
  font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  font-size: 12px;
  line-height: 1.65;
  padding: 12px 14px;
  margin: 0;
  width: 100%;
  min-height: 400px;
  white-space: pre-wrap;
  word-wrap: break-word;
  tab-size: 2;
  border: none;
  border-radius: 0;
  outline: none;
}
.editor-hl {
  background: #010409;
  color: var(--text);
  pointer-events: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  height: auto; /* overridden by bottom:0 constraint */
}
.editor-ta {
  background: transparent;
  color: transparent;
  caret-color: var(--text);
  position: relative;
  resize: vertical;
  z-index: 1;
  overflow-y: auto;
}
/* YAML token colours */
.y-key     { color: #79c0ff; }
.y-str     { color: #a5d6ff; }
.y-num     { color: #f2cc60; }
.y-bool    { color: #ff7b72; }
.y-null    { color: #ff7b72; }
.y-comment { color: var(--muted); font-style: italic; }
.config-toolbar { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.config-status { font-size: 12px; }
.config-status.ok      { color: var(--green); }
.config-status.pending { color: var(--amber); }
.config-status.err     { color: var(--red); }
.btn-config {
  padding: 5px 14px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: border-color 0.15s, color 0.15s;
}
.btn-config:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.btn-config.primary:hover:not(:disabled) { border-color: var(--green); color: var(--green); }
.btn-config:disabled { opacity: 0.4; cursor: not-allowed; }
.config-errors {
  margin-top: 10px;
  padding: 10px 14px;
  background: rgba(248, 81, 73, 0.08);
  border: 1px solid rgba(248, 81, 73, 0.3);
  border-radius: 6px;
  font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  font-size: 12px;
  color: var(--red);
  white-space: pre-wrap;
  display: none;
}

/* database tab */
.db-layout { display: flex; gap: 20px; align-items: flex-start; }
.db-sidebar { width: 220px; flex-shrink: 0; }
.db-sidebar-section { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 10px 0 4px; }
.db-bucket-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 6px 10px; margin-bottom: 2px;
  background: transparent; border: 1px solid transparent; border-radius: 6px;
  color: var(--muted); font-size: 12px; text-align: left; cursor: pointer;
}
.db-bucket-btn:hover { background: var(--surface); border-color: var(--border); color: var(--text); }
.db-bucket-btn.active { background: var(--surface); border-color: var(--accent); color: var(--accent); }
.db-bucket-count { font-size: 11px; background: var(--bg); border-radius: 10px; padding: 1px 7px; }
.db-main { flex: 1; min-width: 0; }
.db-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
.db-title { font-size: 14px; font-weight: 600; }
.db-search { padding: 4px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 12px; outline: none; width: 200px; }
.db-search:focus { border-color: var(--accent); }
.btn-danger { padding: 4px 12px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; cursor: pointer; font-size: 12px; }
.btn-danger:hover { border-color: var(--red); color: var(--red); }
.btn-sm { padding: 2px 8px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; cursor: pointer; font-size: 11px; }
.btn-sm:hover { border-color: var(--red); color: var(--red); }
.db-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.db-table th { background: var(--surface); color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 7px 10px; text-align: left; border-bottom: 2px solid var(--border); }
.db-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
.db-table tr:last-child td { border-bottom: none; }
.db-table tr:hover td { background: rgba(255,255,255,.02); }
.db-show-row { cursor: pointer; }
.db-show-row td:first-child { font-weight: 500; }
.db-eps { display: none; }
.db-eps.open { display: table-row-group; }
.db-eps td { background: var(--bg); font-size: 12px; padding: 5px 10px 5px 24px; color: var(--muted); }
.db-eps td:first-child { color: var(--accent); font-family: 'SFMono-Regular',Consolas,monospace; }
.ep-quality { color: var(--muted); }
.db-empty { color: var(--muted); padding: 30px; text-align: center; font-size: 13px; }
.db-loading { color: var(--muted); padding: 20px; text-align: center; font-size: 13px; }
</style>
</head>
<body>

<header>
  <h1><span>▶</span> Pipeliner<span class="version-badge">__VERSION__</span></h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="header-meta" id="header-meta">connecting…</span>
    <a class="btn-reload" href="https://htmlpreview.github.io/?https://github.com/brunoga/pipeliner/blob/__DOC_REF__/docs/user-guide.html" target="_blank" rel="noopener" style="text-decoration:none">User Guide</a>
    <button class="btn-reload" id="btn-run-all" onclick="runAll(this)">Run all</button>
    <button class="btn-reload" id="btn-reload" onclick="reloadConfig(this)">Reload config</button>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-btn-dashboard" onclick="showTab('dashboard')">Dashboard</button>
  <button class="tab-btn" id="tab-btn-config" onclick="showTab('config')">Edit Config</button>
  <button class="tab-btn" id="tab-btn-db" onclick="showTab('db')">Database</button>
</div>

<div id="tab-dashboard">
  <section>
    <h2>Tasks</h2>
    <div class="task-grid" id="task-grid"><div class="no-tasks">Loading…</div></div>
  </section>

  <section>
    <div class="log-header">
      <h2>Live Log</h2>
      <div class="log-controls">
        <input type="text" id="log-filter" class="log-filter" placeholder="filter…" oninput="applyFilter()" autocomplete="off">
        <div class="log-status">
          <div class="dot" id="log-dot"></div>
          <span id="log-status-text">disconnected</span>
        </div>
        <button class="btn-clear" onclick="clearLog()">Clear</button>
      </div>
    </div>
    <div class="log-console" id="log-console"></div>
  </section>
</div>

<div id="tab-config" style="display:none">
  <section>
    <div class="editor-wrap">
      <pre class="editor-hl" id="editor-hl" aria-hidden="true"></pre>
      <textarea class="editor-ta" id="config-editor" spellcheck="false" autocomplete="off"
        oninput="syncHighlight()" onscroll="syncScroll()" onkeydown="editorTab(event)"></textarea>
    </div>
    <div class="config-toolbar">
      <button class="btn-config" onclick="validateConfig()">Validate</button>
      <button class="btn-config primary" onclick="saveConfig()">Save &amp; Reload</button>
      <span class="config-status" id="config-status"></span>
    </div>
    <div class="config-errors" id="config-errors"></div>
  </section>
</div>

<div id="tab-db" style="display:none">
  <div class="db-layout">
    <div class="db-sidebar" id="db-sidebar">
      <div class="db-loading">Loading…</div>
    </div>
    <div class="db-main" id="db-main">
      <div class="db-empty">Select a bucket from the left.</div>
    </div>
  </div>
</div>

<script>
'use strict';

const MAX_LINES = 500;
let logLines = []; // [{el, raw}]
let startedAt = Date.now();

// ── polling ───────────────────────────────────────────────────────────────────

let reloading = false;

async function refresh() {
  try {
    const [sr, hr] = await Promise.all([fetch('/api/status'), fetch('/api/history')]);
    const status  = await sr.json();
    const history = await hr.json();
    const tasks   = status.tasks || [];
    render(tasks, history);
    document.getElementById('header-meta').textContent =
      'up ' + fmtUptime(Math.round((Date.now() - startedAt) / 1000)) +
      ' · ' + tasks.length + ' task' + (tasks.length !== 1 ? 's' : '');
    if (!reloading) {
      const anyRunning = tasks.some(t => t.running);
      const allRunning = tasks.length > 0 && tasks.every(t => t.running);
      
      const reloadBtn = document.getElementById('btn-reload');
      reloadBtn.disabled = anyRunning;
      reloadBtn.title = anyRunning ? 'Cannot reload while a task is running' : '';

      const runAllBtn = document.getElementById('btn-run-all');
      runAllBtn.disabled = allRunning;
      runAllBtn.title = allRunning ? 'All tasks are already running' : '';
    }
  } catch (e) {
    document.getElementById('header-meta').textContent = 'error — retrying';
  }
}

function render(tasks, history) {
  const grid = document.getElementById('task-grid');
  if (!tasks.length) {
    grid.innerHTML = '<div class="no-tasks">No tasks configured.</div>';
    return;
  }
  grid.innerHTML = tasks.map(t => card(t, (history[t.name] || [])[0])).join('');
}

function card(t, last) {
  const nextDate   = t.nextRun ? new Date(t.nextRun) : null;
  const schedLabel = nextDate ? fmtDatetime(nextDate) : (t.schedule ? t.schedule : 'manual');
  const schedOpacity = (!nextDate && !t.schedule) ? ' style="opacity:.5"' : '';
  const schedBadge = `<span class="task-schedule"${schedOpacity} title="${esc(t.schedule || '')}">${esc(schedLabel)}</span>`;

  const runningBadge = t.running ? `<span class="running-badge">running</span>` : '';

  const nextStr = nextDate ? 'in ' + relTime(nextDate) : '—';
  const lastStr = last ? relTime(new Date(last.at)) + ' ago' : 'never';
  const durStr  = last ? ' · ' + last.duration : '';

  const stats = last
    ? `<div class="task-stats">
         <div class="stat"><div class="stat-val a">${last.accepted}</div><div class="stat-lbl">accepted</div></div>
         <div class="stat"><div class="stat-val r">${last.rejected}</div><div class="stat-lbl">rejected</div></div>
         <div class="stat"><div class="stat-val f">${last.failed}</div><div class="stat-lbl">failed</div></div>
       </div>`
    : `<div class="task-empty">No runs yet</div>`;

  const errLine = (last && last.err)
    ? `<div class="task-err">⚠ ${esc(last.err)}</div>` : '';

  const runBtn = t.running
    ? `<button class="btn-run running" disabled>Running…</button>`
    : `<button class="btn-run" onclick="triggerRun(${esc(JSON.stringify(t.name))}, this)">Run now</button>`;

  return `
    <div class="task-card">
      <div class="task-card-header">
        <div class="task-name">${esc(t.name)}</div>
        <div style="display:flex;gap:6px;align-items:center">${runningBadge}${schedBadge}</div>
      </div>
      <div class="task-timing">
        <span><span>Next run</span><b>${nextStr}</b></span>
        <span><span>Last run</span><b>${lastStr}${esc(durStr)}</b></span>
      </div>
      ${stats}
      ${errLine}
      ${runBtn}
    </div>`;
}

// ── manual trigger ────────────────────────────────────────────────────────────

async function triggerRun(name, btn) {
  btn.disabled = true;
  btn.textContent = 'Triggered…';
  btn.classList.add('triggered');
  try {
    await fetch('/api/tasks/' + encodeURIComponent(name) + '/run', { method: 'POST' });
  } catch (_) {}
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = 'Run now';
    btn.classList.remove('triggered');
    refresh();
  }, 3000);
}

// ── SSE log stream ────────────────────────────────────────────────────────────

function connectLogs() {
  const dot  = document.getElementById('log-dot');
  const text = document.getElementById('log-status-text');
  const es   = new EventSource('/api/logs');

  es.onopen = () => { dot.classList.add('on'); text.textContent = 'connected'; };

  es.onmessage = ev => appendLog(ev.data);

  es.onerror = () => {
    dot.classList.remove('on');
    text.textContent = 'reconnecting…';
    es.close();
    setTimeout(connectLogs, 3000);
  };
}

function appendLog(line) {
  const el = document.createElement('div');
  el.className = 'log-line';
  el.innerHTML = renderLogLine(line);

  const filter = document.getElementById('log-filter').value.toLowerCase();
  if (filter && !line.toLowerCase().includes(filter)) {
    el.style.display = 'none';
  }

  const con = document.getElementById('log-console');
  const atBottom = con.scrollHeight - con.scrollTop - con.clientHeight < 60;
  con.appendChild(el);
  logLines.push({el, raw: line});
  if (logLines.length > MAX_LINES) { logLines.shift().el.remove(); }
  if (atBottom) con.scrollTop = con.scrollHeight;
}

function clearLog() {
  document.getElementById('log-console').innerHTML = '';
  logLines = [];
}

function applyFilter() {
  const filter = document.getElementById('log-filter').value.toLowerCase();
  for (const {el, raw} of logLines) {
    el.style.display = (!filter || raw.toLowerCase().includes(filter)) ? '' : 'none';
  }
}

// Convert ANSI escape sequences in a log line to HTML spans.
// The server sends ANSI-colored output; this renders it faithfully without
// any message-content guessing.
function renderLogLine(line) {
  return ansiToHtml(line);
}

const ANSI_COLORS = {
  '1':  { bold: true },
  '31': { color: '#f85149' }, // red
  '32': { color: '#3fb950' }, // green
  '33': { color: '#d29922' }, // amber
  '35': { color: '#bc8cff' }, // magenta
  '36': { color: '#58a6ff' }, // cyan
  '90': { color: '#8b949e' }, // gray
};

function ansiToHtml(text) {
  // Split on ESC[...m sequences; odd parts are code strings, even parts are text.
  const parts = text.split(/\x1b\[([0-9;]*)m/);
  let style = {};
  let out = '';

  for (let i = 0; i < parts.length; i++) {
    if (i % 2 === 0) {
      // Text segment — wrap in span only when a style is active.
      const content = parts[i]
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      if (!content) continue;
      const css = [];
      if (style.color) css.push('color:' + style.color);
      if (style.bold)  css.push('font-weight:600');
      out += css.length
        ? `<span style="${css.join(';')}">${content}</span>`
        : content;
    } else {
      // ANSI code segment — update current style state.
      const codes = parts[i] === '' ? ['0'] : parts[i].split(';');
      for (const code of codes) {
        if (code === '0' || code === '') {
          style = {};
        } else {
          const def = ANSI_COLORS[code];
          if (def) Object.assign(style, def);
        }
      }
    }
  }
  return out;
}

// ── helpers ───────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relTime(d) {
  const s = Math.round(Math.abs(Date.now() - d) / 1000);
  if (s < 90)    return s + 's';
  if (s < 5400)  return Math.round(s / 60) + 'm';
  if (s < 86400) return Math.round(s / 3600) + 'h';
  return Math.round(s / 86400) + 'd';
}

function fmtUptime(s) {
  if (s < 60)   return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

function fmtDatetime(d) {
  return d.toLocaleString(undefined, {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});
}

// ── run all tasks ─────────────────────────────────────────────────────────────

async function runAll(btn) {
  btn.disabled = true;
  btn.classList.add('triggered');
  btn.textContent = 'Triggered…';
  try {
    await fetch('/api/tasks/run', { method: 'POST' });
  } catch (_) {}
  setTimeout(() => {
    btn.disabled = false;
    btn.classList.remove('triggered');
    btn.textContent = 'Run all';
    refresh();
  }, 3000);
}

// ── reload config ─────────────────────────────────────────────────────────────

async function reloadConfig(btn) {
  reloading = true;
  btn.disabled = true;
  btn.textContent = 'Reloading…';
  btn.className = 'btn-reload';
  btn.title = '';
  try {
    const r = await fetch('/api/reload', { method: 'POST' });
    if (r.ok) {
      btn.textContent = 'Reloaded ✓';
      btn.classList.add('ok');
      await refresh();
    } else {
      const msg = await r.text();
      btn.textContent = 'Error';
      btn.classList.add('err');
      btn.title = msg.trim();
    }
  } catch (e) {
    btn.textContent = 'Error';
    btn.classList.add('err');
    btn.title = String(e);
  }
  setTimeout(() => {
    reloading = false;
    btn.textContent = 'Reload config';
    btn.className = 'btn-reload';
    btn.title = '';
    refresh(); // re-evaluate disabled state
  }, 3000);
}

// ── tabs ──────────────────────────────────────────────────────────────────────

let configLoaded = false;

function showTab(name) {
  document.getElementById('tab-dashboard').style.display = name === 'dashboard' ? '' : 'none';
  document.getElementById('tab-config').style.display    = name === 'config'    ? '' : 'none';
  document.getElementById('tab-db').style.display        = name === 'db'        ? '' : 'none';
  document.getElementById('tab-btn-dashboard').classList.toggle('active', name === 'dashboard');
  document.getElementById('tab-btn-config').classList.toggle('active', name === 'config');
  document.getElementById('tab-btn-db').classList.toggle('active', name === 'db');
  if (name === 'config' && !configLoaded) loadConfig();
  if (name === 'db' && !dbLoaded) loadDBSidebar();
}

// ── YAML syntax highlighting ──────────────────────────────────────────────────

function highlightYAML(text) {
  return text.split('\n').map(line => {
    const e = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // Comment line
    if (/^\s*#/.test(line)) return `<span class="y-comment">${e(line)}</span>`;
    // Key: value
    const kv = line.match(/^(\s*)([\w\-\.]+)(\s*:)([ \t]*.*)$/);
    if (kv) {
      const [,ind,key,colon,rest] = kv;
      return e(ind) + `<span class="y-key">${e(key)}</span>` + e(colon) + hlVal(rest, e);
    }
    // List item
    const li = line.match(/^(\s*-[ \t]*)(.*)$/);
    if (li) return e(li[1]) + hlVal(li[2], e);
    return e(line);
  }).join('\n') + '\n'; // trailing newline keeps caret on last line visible
}

function hlVal(s, e) {
  const t = s.trim();
  if (!t) return e(s);
  // Inline comment
  const cm = s.match(/^([^#"']*)(#.*)$/);
  if (cm && !/^["']/.test(t)) return e(cm[1]) + `<span class="y-comment">${e(cm[2])}</span>`;
  // Quoted string
  if (/^["']/.test(t)) return `<span class="y-str">${e(s)}</span>`;
  // Bool
  if (/^(true|false|yes|no|on|off)$/i.test(t)) return `<span class="y-bool">${e(s)}</span>`;
  // Null
  if (/^(null|~)$/.test(t)) return `<span class="y-null">${e(s)}</span>`;
  // Number
  if (/^-?\d+(\.\d+)?$/.test(t)) return `<span class="y-num">${e(s)}</span>`;
  return e(s);
}

function syncHighlight() {
  const ta = document.getElementById('config-editor');
  document.getElementById('editor-hl').innerHTML = highlightYAML(ta.value);
  syncScroll(); // re-sync height and scroll position after content changes
}

function syncScroll() {
  const ta = document.getElementById('config-editor');
  const hl = document.getElementById('editor-hl');
  // Keep the pre constrained to the textarea's visible height so its
  // content can overflow and be scrolled in sync.
  hl.style.height = ta.clientHeight + 'px';
  hl.scrollTop  = ta.scrollTop;
  hl.scrollLeft = ta.scrollLeft;
}

function editorTab(e) {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const ta = document.getElementById('config-editor');
  const s = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = s + 2;
  syncHighlight();
}

// ── config editor ─────────────────────────────────────────────────────────────

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) return;
    const { content } = await r.json();
    document.getElementById('config-editor').value = content;
    configLoaded = true;
    syncHighlight();
  } catch (e) { /* silently skip if endpoint not available */ }
}

async function validateConfig() {
  const content = document.getElementById('config-editor').value;
  setConfigStatus('', '');
  try {
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content, dry_run: true}),
    });
    if (r.status === 422) {
      const { errors } = await r.json();
      showConfigErrors(errors);
      setConfigStatus('err', '✗ ' + errors.length + ' error' + (errors.length !== 1 ? 's' : ''));
    } else if (r.ok) {
      showConfigErrors([]);
      setConfigStatus('ok', '✓ Config is valid');
    } else {
      setConfigStatus('err', 'Server error: ' + r.status);
    }
  } catch (e) {
    setConfigStatus('err', String(e));
  }
}

async function saveConfig() {
  const content = document.getElementById('config-editor').value;
  setConfigStatus('', '');
  try {
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content}),
    });
    if (r.status === 422) {
      const { errors } = await r.json();
      showConfigErrors(errors);
      setConfigStatus('err', '✗ ' + errors.length + ' error' + (errors.length !== 1 ? 's' : '') + ' — not saved');
      return;
    }
    if (!r.ok) { setConfigStatus('err', 'Save failed: ' + r.status); return; }
    showConfigErrors([]);
    const { status } = await r.json();
    if (status === 'reloaded') {
      setConfigStatus('ok', '✓ Saved and reloaded');
      refresh();
    } else {
      setConfigStatus('pending', '⏳ Saved — will reload when tasks finish');
    }
  } catch (e) {
    setConfigStatus('err', String(e));
  }
}

function setConfigStatus(cls, msg) {
  const el = document.getElementById('config-status');
  el.className = 'config-status' + (cls ? ' ' + cls : '');
  el.textContent = msg;
}

function showConfigErrors(errors) {
  const el = document.getElementById('config-errors');
  if (!errors || errors.length === 0) {
    el.style.display = 'none';
    el.textContent = '';
  } else {
    el.style.display = 'block';
    el.textContent = errors.join('\n');
  }
}

// ── database tab ─────────────────────────────────────────────────────────────

let dbLoaded = false;
let dbBuckets = [];
let dbActiveBucket = null;
let dbSearch = '';

const CATEGORY_ORDER = ['tracker', 'cache', 'discover', 'other'];
const CATEGORY_LABELS = {tracker: 'Trackers', cache: 'Caches', discover: 'Discover', other: 'Lists & Other'};

async function loadDBSidebar() {
  try {
    const r = await fetch('/api/db/buckets');
    if (!r.ok) return;
    const { buckets } = await r.json();
    dbBuckets = buckets || [];
    dbLoaded = true;
    renderDBSidebar();
  } catch(e) {
    document.getElementById('db-sidebar').innerHTML = '<div class="db-empty">Error loading database.</div>';
  }
}

function renderDBSidebar() {
  const groups = {};
  for (const b of dbBuckets) {
    if (!groups[b.category]) groups[b.category] = [];
    groups[b.category].push(b);
  }
  let html = '';
  for (const cat of CATEGORY_ORDER) {
    if (!groups[cat]) continue;
    html += `<div class="db-sidebar-section">${CATEGORY_LABELS[cat]}</div>`;
    for (const b of groups[cat]) {
      const active = dbActiveBucket === b.name ? ' active' : '';
      html += `<button class="db-bucket-btn${active}" onclick="selectBucket(${esc(JSON.stringify(b.name))})">
        <span>${esc(b.display)}</span>
        <span class="db-bucket-count">${b.count}</span>
      </button>`;
    }
  }
  document.getElementById('db-sidebar').innerHTML = html || '<div class="db-empty">No data.</div>';
}

// Buckets whose keys are TVDB series IDs — we resolve them to names using
// the search cache (cache_metainfo_tvdb) as a companion lookup.
const TVDB_ID_KEYED_BUCKETS = new Set([
  'cache_metainfo_tvdb_ext',
  'cache_metainfo_tvdb_eps',
]);

async function selectBucket(name) {
  dbActiveBucket = name;
  dbSearch = '';
  renderDBSidebar();
  const main = document.getElementById('db-main');
  main.innerHTML = '<div class="db-loading">Loading…</div>';
  try {
    const requests = [fetch('/api/db/buckets/' + encodeURIComponent(name))];
    if (TVDB_ID_KEYED_BUCKETS.has(name)) {
      requests.push(fetch('/api/db/buckets/cache_metainfo_tvdb'));
    }
    const responses = await Promise.all(requests);
    if (!responses[0].ok) { main.innerHTML = '<div class="db-empty">Error loading bucket.</div>'; return; }
    const data = await responses[0].json();

    // Build id→name map from the search cache if available.
    let idToName = {};
    if (responses[1]?.ok) {
      const searchData = await responses[1].json();
      for (const e of (searchData.entries || [])) {
        // Cache entries are stored as {v: <data>, e: <expiry>} (storedEntry struct).
        const results = e.value?.v;
        if (Array.isArray(results) && results[0]?.tvdb_id && results[0]?.name) {
          idToName[String(results[0].tvdb_id)] = results[0].name;
        }
      }
    }
    renderDBMain(name, data, idToName);
  } catch(e) {
    main.innerHTML = '<div class="db-empty">Error loading bucket.</div>';
  }
}

function renderDBMain(name, data, idToName = {}) {
  const bucket = dbBuckets.find(b => b.name === name) || {name, display: name, count: data.entries?.length || 0};
  const main = document.getElementById('db-main');

  const toolbar = `<div class="db-toolbar">
    <span class="db-title">${esc(bucket.display)}</span>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="text" class="db-search" placeholder="filter…" oninput="dbFilter(this.value)" value="">
      <button class="btn-danger" onclick="clearBucket(${esc(JSON.stringify(name))})">Clear bucket</button>
    </div>
  </div>`;

  if (name === 'series' && data.grouped) {
    main.innerHTML = toolbar + renderSeriesTable(data.grouped, name);
  } else {
    main.innerHTML = toolbar + renderGenericTable(data.entries || [], name, idToName);
  }
}

function renderSeriesTable(shows, bucketName) {
  if (!shows.length) return '<div class="db-empty">No tracked series.</div>';
  let html = `<table class="db-table" id="db-content-table">
    <thead><tr><th>Show</th><th>Episodes</th><th></th></tr></thead>`;
  for (const show of shows) {
    const sid = 'eps-' + btoa(encodeURIComponent(show.name)).replace(/=/g,'');
    html += `<tbody>
      <tr class="db-show-row" onclick="toggleEps('${sid}')">
        <td>${esc(show.name)}</td>
        <td style="color:var(--muted)">${show.episodes.length} episode${show.episodes.length !== 1 ? 's' : ''}</td>
        <td style="text-align:right"><button class="btn-sm" onclick="event.stopPropagation();deleteShow(${esc(JSON.stringify(bucketName))},${esc(JSON.stringify(show.name))})">Delete show</button></td>
      </tr>
    </tbody>
    <tbody class="db-eps" id="${sid}">`;
    for (const ep of show.episodes) {
      const key = show.name + '|' + ep.episode_id;
      const date = ep.downloaded_at ? new Date(ep.downloaded_at).toLocaleDateString() : '—';
      html += `<tr>
        <td>${esc(ep.episode_id)}</td>
        <td class="ep-quality">${esc(ep.quality || '—')}</td>
        <td style="color:var(--muted)">${date}</td>
        <td style="text-align:right"><button class="btn-sm" onclick="deleteEntry(${esc(JSON.stringify(bucketName))},${esc(JSON.stringify(key))})">×</button></td>
      </tr>`;
    }
    html += '</tbody>';
  }
  html += '</table>';
  return html;
}

// episodeSummary builds a compact season→episode-count string from a cached
// []Episode array, e.g. "S01×13  S02×10  S03×8".
function episodeSummary(episodes) {
  if (!Array.isArray(episodes) || !episodes.length) return '';
  const seasons = {};
  for (const ep of episodes) {
    const s = ep.seasonNumber ?? ep.season_number ?? 0;
    seasons[s] = (seasons[s] || 0) + 1;
  }
  return Object.keys(seasons)
    .sort((a, b) => Number(a) - Number(b))
    .map(s => `<span style="color:var(--accent)">S${String(s).padStart(2,'0')}</span><span style="color:var(--muted)">×${seasons[s]}</span>`)
    .join('  ');
}

function renderGenericTable(entries, bucketName, idToName = {}) {
  if (!entries.length) return '<div class="db-empty">Empty bucket.</div>';
  const hasNames = Object.keys(idToName).length > 0;
  const isEpsCache = bucketName === 'cache_metainfo_tvdb_eps';
  let html = `<table class="db-table" id="db-content-table">
    <thead><tr><th>Key</th>${hasNames ? '<th>Series</th>' : ''}${isEpsCache ? '<th>Episodes</th>' : ''}<th></th></tr></thead><tbody>`;
  for (const e of entries) {
    const seriesName = idToName[e.key];
    const epsSummary = isEpsCache ? episodeSummary(e.value?.v) : '';
    html += `<tr>
      <td style="word-break:break-all;font-family:monospace;font-size:12px">${esc(e.key)}</td>
      ${hasNames ? `<td style="color:var(--text)">${seriesName ? esc(seriesName) : '<span style="color:var(--muted)">unknown</span>'}</td>` : ''}
      ${isEpsCache ? `<td style="font-size:12px;white-space:nowrap">${epsSummary || '<span style="color:var(--muted)">—</span>'}</td>` : ''}
      <td style="text-align:right;white-space:nowrap"><button class="btn-sm" onclick="deleteEntry(${esc(JSON.stringify(bucketName))},${esc(JSON.stringify(e.key))})">×</button></td>
    </tr>`;
  }
  html += '</tbody></table>';
  return html;
}

function toggleEps(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function dbFilter(val) {
  dbSearch = val.toLowerCase();
  const table = document.getElementById('db-content-table');
  if (!table) return;
  // For series table: hide show rows + their episode groups when name doesn't match.
  const showRows = table.querySelectorAll('.db-show-row');
  showRows.forEach(row => {
    const name = row.cells[0]?.textContent?.toLowerCase() || '';
    const match = !dbSearch || name.includes(dbSearch);
    row.style.display = match ? '' : 'none';
    const epsId = row.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    if (epsId) {
      const epsEl = document.getElementById(epsId);
      if (epsEl) epsEl.style.display = match ? '' : 'none';
    }
  });
  // For generic table.
  const rows = table.querySelectorAll('tbody tr:not(.db-show-row)');
  rows.forEach(row => {
    if (row.closest('.db-eps')) return;
    const text = row.textContent.toLowerCase();
    row.style.display = (!dbSearch || text.includes(dbSearch)) ? '' : 'none';
  });
}

async function clearBucket(name) {
  if (!confirm(`Clear all entries in "${name}"? This cannot be undone.`)) return;
  try {
    const r = await fetch('/api/db/buckets/' + encodeURIComponent(name), {method: 'DELETE'});
    if (r.ok) { await reloadBucket(name); await loadDBSidebar(); }
    else alert('Error: ' + await r.text());
  } catch(e) { alert(String(e)); }
}

async function deleteShow(bucket, showName) {
  if (!confirm(`Delete all episodes of "${showName}"?`)) return;
  // Delete all keys that start with showName|
  try {
    const r = await fetch('/api/db/buckets/' + encodeURIComponent(bucket));
    const data = await r.json();
    const prefix = showName + '|';
    const keys = (data.entries || []).filter(e => e.key.startsWith(prefix)).map(e => e.key);
    await Promise.all(keys.map(key =>
      fetch('/api/db/entries/' + encodeURIComponent(bucket), {
        method: 'DELETE',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({key}),
      })
    ));
    await reloadBucket(bucket);
    await loadDBSidebar();
  } catch(e) { alert(String(e)); }
}

async function deleteEntry(bucket, key) {
  try {
    const r = await fetch('/api/db/entries/' + encodeURIComponent(bucket), {
      method: 'DELETE',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key}),
    });
    if (r.ok) { await reloadBucket(bucket); await loadDBSidebar(); }
    else alert('Error: ' + await r.text());
  } catch(e) { alert(String(e)); }
}

async function reloadBucket(name) {
  if (dbActiveBucket !== name) return;
  const requests = [fetch('/api/db/buckets/' + encodeURIComponent(name))];
  if (TVDB_ID_KEYED_BUCKETS.has(name)) {
    requests.push(fetch('/api/db/buckets/cache_metainfo_tvdb'));
  }
  const responses = await Promise.all(requests);
  if (!responses[0].ok) return;
  const data = await responses[0].json();
  let idToName = {};
  if (responses[1]?.ok) {
    const searchData = await responses[1].json();
    for (const e of (searchData.entries || [])) {
      try {
        const results = JSON.parse(e.value);
        if (Array.isArray(results) && results[0]?.tvdb_id && results[0]?.name) {
          idToName[String(results[0].tvdb_id)] = results[0].name;
        }
      } catch(_) {}
    }
  }
  renderDBMain(name, data, idToName);
  if (dbSearch) dbFilter(dbSearch);
}

// ── boot ──────────────────────────────────────────────────────────────────────

refresh();
setInterval(refresh, 10000);
connectLogs();
