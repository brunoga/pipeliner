variables:
  deluge_host: localhost
  deluge_pass: changeme
  tv_path: /media/tv

templates:
  common:
    params: [feed_url]
    rss:
      url: "{$ feed_url $}"
    seen:

tasks:
  tv-series:
    - use: [common, "https://example.com/rss/torrents"]
    - metainfo_quality:
    - series:
        tracking: strict
        quality: 720p
        static:
          - "Breaking Bad"
          - "Better Call Saul"
          - "The Wire"
          - "Severance"
    - pathfmt:
        path: '{$ tv_path $}/{title}/Season {series_season:02d}'
        field: download_path
    - deluge:
        host: "{$ deluge_host $}"
        password: "{$ deluge_pass $}"
        path: "{download_path}"

schedules:
  tv-series: 1h
