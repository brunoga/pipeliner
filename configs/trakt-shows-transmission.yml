variables:
  trakt_client_id: YOUR_TRAKT_CLIENT_ID
  trakt_client_secret: YOUR_TRAKT_CLIENT_SECRET
  tv_path: /media/tv

templates:
  common:
    rss:
      url: "https://example.com/rss/shows"
    seen:

tasks:
  # Downloads episodes for every show on the Trakt watchlist.
  # series.from fetches the watchlist once per ttl and uses it as the show list.
  tv-watchlist:
    template: common
    metainfo_quality:
    series:
      tracking: strict
      quality: 720p
      ttl: 2h
      from:
        - name: trakt_list
          client_id: "{$ trakt_client_id $}"
          client_secret: "{$ trakt_client_secret $}"
          type: shows
          list: watchlist
    metainfo_trakt:
      client_id: "{$ trakt_client_id $}"
      type: shows
    metainfo_tvdb:
      api_key: YOUR_TVDB_API_KEY
    pathfmt:
      path: '{$ tv_path $}/{title}/Season {series_season:02d}'
      field: download_path
    transmission:
      host: localhost
      port: 9091
      path: "{download_path}"

  # A second task pulling from the Trakt trending list.
  # Uses backfill tracking so it can catch up on already-started shows.
  tv-trending:
    template: common
    metainfo_quality:
    series:
      tracking: backfill
      quality: 1080p
      ttl: 6h
      from:
        - name: trakt_list
          client_id: "{$ trakt_client_id $}"
          type: shows
          list: trending
          limit: 50
    pathfmt:
      path: '{$ tv_path $}/{title}/Season {series_season:02d}'
      field: download_path
    transmission:
      host: localhost
      port: 9091
      path: "{download_path}"

schedules:
  tv-watchlist: 1h
  tv-trending: 6h
