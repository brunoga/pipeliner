services:
  pipeliner:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
    ports:
      - "8080:8080"
    volumes:
      # Persists config.yml and pipeliner.db (state/history) across restarts.
      - pipeliner-data:/config
    environment:
      PIPELINER_WEB_USER: admin
      PIPELINER_WEB_PASSWORD: changeme     # change before exposing to a network
      PIPELINER_LOG_LEVEL: info
    restart: unless-stopped

volumes:
  pipeliner-data:
