name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        # Playwright tests are in ./internal/web/... and auto-skip when
        # Chromium is not installed — the dedicated e2e-test job installs it.
        run: go test -race -timeout 120s ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm && format('/v{0}', matrix.goarm) || '' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - {goos: linux,   goarch: amd64}
          - {goos: linux,   goarch: arm64}
          - {goos: linux,   goarch: arm,   goarm: "7"}
          # Windows
          - {goos: windows, goarch: amd64}
          - {goos: windows, goarch: arm64}
          # macOS
          - {goos: darwin,  goarch: amd64}
          - {goos: darwin,  goarch: arm64}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOARM:       ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --dirty --always 2>/dev/null || echo "dev")
          go build -ldflags "-s -w -X main.version=${VERSION}" ./cmd/pipeliner

      - name: Verify go.mod is tidy
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  e2e-test:
    name: E2E Tests (Playwright/Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Playwright browsers
        run: go run github.com/playwright-community/playwright-go/cmd/playwright install --with-deps chromium

      - name: Run E2E tests
        run: go test -race -timeout 120s ./internal/web/...

  ui-test:
    name: UI Tests (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: internal/web/ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: internal/web/ui

      - name: Run JS unit tests
        run: npm test
        working-directory: internal/web/ui

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout 5m

  # Summary job so branch-protection can require a single "Build" check
  # instead of one entry per matrix combination.
  build-summary:
    name: Build
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all builds passed
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more cross-compile jobs failed"
            exit 1
          fi
