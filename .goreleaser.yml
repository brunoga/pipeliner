version: 2

builds:
  - main: ./cmd/pipeliner
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    # arm/v7 only makes sense on Linux; skip it for Windows and macOS.
    ignore:
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: arm

archives:
  - name_template: "pipeliner_{{.Version}}_{{.Os}}_{{.Arch}}{{if .Arm}}v{{.Arm}}{{end}}"
    files:
      - docs/user-guide.html
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  # Allow overwriting an existing release when a tag is re-pushed
  # (e.g. after fixing the tag to point at the right commit).
  # Without this, GoReleaser fails with "422 already_exists" on every asset.
  replace_existing_artifacts: true

changelog:
  use: github-native
