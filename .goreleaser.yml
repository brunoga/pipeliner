version: 2

before:
  hooks:
    # Stage the top-level and configs READMEs with archive-escaping links
    # (anything under plugins/) rewritten to absolute GitHub URLs at this tag,
    # so the docs shipped in the archives have no broken links.
    - go run ./internal/tools/releasedocs -tag {{ .Tag }} -out build/release-docs

builds:
  - main: ./cmd/pipeliner
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    # arm/v7 only makes sense on Linux; skip it for Windows and macOS.
    ignore:
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: arm

archives:
  - name_template: "pipeliner_{{.Version}}_{{.Os}}_{{.Arch}}{{if .Arm}}v{{.Arm}}{{end}}"
    files:
      # The user guide is embedded in the binary and served at /guide (with
      # its screenshots), so it is not duplicated here as a standalone file.
      # Version history (links are absolute GitHub URLs — no rewriting needed).
      - CHANGELOG.md
      # Annotated sample pipelines the user can copy and adapt.
      - src: configs/*.star
        dst: configs
      # READMEs with archive-escaping links rewritten by the before hook.
      # A single-file src takes dst as the exact archive path (unlike a glob,
      # which appends the basename), so name the file explicitly.
      - src: build/release-docs/README.md
        dst: README.md
        info:
          mode: 0644
      - src: build/release-docs/configs/README.md
        dst: configs/README.md
        info:
          mode: 0644
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  # Allow overwriting an existing release when a tag is re-pushed
  # (e.g. after fixing the tag to point at the right commit).
  # Without this, GoReleaser fails with "422 already_exists" on every asset.
  replace_existing_artifacts: true

changelog:
  use: github-native
